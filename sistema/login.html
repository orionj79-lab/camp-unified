<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Seguro | CAMP</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    /* Estilos específicos para la página de Login */
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-image:
        radial-gradient(circle at top right, rgba(139, 92, 246, 0.15), transparent 40%),
        radial-gradient(circle at bottom left, rgba(236, 72, 153, 0.1), transparent 40%);
      padding: 24px;
    }

    .login-wrapper {
      width: 100%;
      max-width: 440px;
      animation: fadeInUp 0.5s var(--ease);
    }

    .login-card {
      background: rgba(26, 23, 48, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-bright);
      border-radius: var(--radius-xl);
      padding: 40px;
      box-shadow: var(--shadow-lg), 0 0 80px rgba(139, 92, 246, 0.1);
      position: relative;
      overflow: hidden;
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--grad-brand);
      opacity: 0.8;
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      border-radius: var(--radius-lg);
      background: var(--bg-card);
      box-shadow: var(--shadow-purple);
      margin-bottom: 20px;
    }

    .login-title {
      font-family: 'Outfit', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .login-sub {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 8px;
      display: block;
    }

    .form-input {
      width: 100%;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 15px;
      padding: 14px 16px;
      transition: all var(--trans);
    }

    .form-input:focus {
      border-color: var(--purple-500);
      background: rgba(139, 92, 246, 0.05);
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      border-radius: var(--radius-sm);
      background: var(--grad-brand);
      color: #fff;
      border: none;
      cursor: pointer;
      transition: all var(--trans);
      box-shadow: var(--shadow-purple);
      margin-top: 10px;
      position: relative;
      overflow: hidden;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(139, 92, 246, 0.4);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    /* Loading spinner for button */
    .btn-loading {
      color: transparent !important;
      pointer-events: none;
    }

    .btn-loading::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 20px;
      height: 20px;
      margin-top: -10px;
      margin-left: -10px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .error-msg {
      color: var(--red-400);
      font-size: 13px;
      margin-top: -10px;
      margin-bottom: 15px;
      display: none;
      text-align: center;
      background: rgba(239, 68, 68, 0.1);
      padding: 10px;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .forgot-link {
      display: block;
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 24px;
      transition: color var(--trans);
    }

    .forgot-link:hover {
      color: var(--text-primary);
    }
  </style>
</head>

<body>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">
          <svg width="34" height="34" viewBox="0 0 28 28" fill="none">
            <path d="M4 6C4 4.9 4.9 4 6 4H22C23.1 4 24 4.9 24 6V22C24 23.1 23.1 24 22 24H6C4.9 24 4 23.1 4 22V6Z"
              fill="url(#logoGrad)" />
            <path d="M9 10H19M9 14H16M9 18H13" stroke="white" stroke-width="2" stroke-linecap="round" />
            <defs>
              <linearGradient id="logoGrad" x1="4" y1="4" x2="24" y2="24" gradientUnits="userSpaceOnUse">
                <stop stop-color="#8B5CF6" />
                <stop offset="1" stop-color="#EC4899" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1 class="login-title">Acceso a CAMP</h1>
        <p class="login-sub">Sistema de Seguimiento Oficial</p>
      </div>

      <div id="errorBox" class="error-msg">Credenciales incorrectas. Verifique e intente de nuevo.</div>

      <form id="loginForm" onsubmit="event.preventDefault(); Auth.login();">
        <div class="form-group">
          <label class="form-label">Usuario</label>
          <input type="text" id="email" class="form-input" placeholder="Usuario" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <input type="password" id="password" class="form-input" placeholder="••••••••" required
            autocomplete="current-password" />
        </div>

        <button type="submit" id="submitBtn" class="btn-login">Ingresar al Sistema</button>
      </form>

      <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const pass = document.getElementById('password').value;
      const btn = document.getElementById('submitBtn');
      const err = document.getElementById('errorBox');
      Auth.login(email, pass, btn, err);
    });

    document.addEventListener('DOMContentLoaded', Auth.requireNoAuth);
  </script>
</body>

</html>
