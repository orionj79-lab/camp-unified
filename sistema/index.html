<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAMP · Sistema de Seguimiento — Esperando contra toda esperanza</title>
  <meta name="description"
    content="Panel de control integral para el ecosistema del libro Esperando contra toda esperanza de J.J. Vargas" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
  <!-- Sidebar Navigation -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <path d="M4 6C4 4.9 4.9 4 6 4H22C23.1 4 24 4.9 24 6V22C24 23.1 23.1 24 22 24H6C4.9 24 4 23.1 4 22V6Z"
              fill="url(#logoGrad)" />
            <path d="M9 10H19M9 14H16M9 18H13" stroke="white" stroke-width="2" stroke-linecap="round" />
            <defs>
              <linearGradient id="logoGrad" x1="4" y1="4" x2="24" y2="24" gradientUnits="userSpaceOnUse">
                <stop stop-color="#8B5CF6" />
                <stop offset="1" stop-color="#EC4899" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="logo-text">
          <span class="logo-title">CAMP</span>
          <span class="logo-sub">Ecosistema Digital</span>
        </div>
      </div>
      <button class="sidebar-toggle" id="sidebarToggle" aria-label="Colapsar menú">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M15 10H5M5 10L9 6M5 10L9 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>
      </button>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Principal</div>
      <a href="#" data-view="dashboard" class="nav-item active" id="nav-dashboard">
        <span class="nav-icon">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <rect x="2" y="2" width="7" height="7" rx="1.5" fill="currentColor" opacity=".8" />
            <rect x="11" y="2" width="7" height="7" rx="1.5" fill="currentColor" />
            <rect x="2" y="11" width="7" height="7" rx="1.5" fill="currentColor" />
            <rect x="11" y="11" width="7" height="7" rx="1.5" fill="currentColor" opacity=".8" />
          </svg>
        </span>
        <span class="nav-label">Dashboard KPIs</span>
        <span class="nav-badge live">LIVE</span>
      </a>
      <div class="nav-section-label">Gestión</div>
      <a href="#" data-view="leads" class="nav-item" id="nav-leads">
        <span class="nav-icon">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <circle cx="8" cy="6" r="3" fill="currentColor" />
            <path d="M2 17c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="currentColor" stroke-width="2" fill="none" />
            <path d="M15 9l2 2 3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          </svg>
        </span>
        <span class="nav-label">Leads & Prospectos</span>
        <span class="nav-badge count" id="badge-leads">0</span>
      </a>
      <a href="#" data-view="conferences" class="nav-item" id="nav-conferences">
        <span class="nav-icon">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <rect x="2" y="4" width="16" height="13" rx="2" stroke="currentColor" stroke-width="2" fill="none" />
            <path d="M2 8h16" stroke="currentColor" stroke-width="2" />
            <path d="M7 2v4M13 2v4" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          </svg>
        </span>
        <span class="nav-label">Conferencias</span>
        <span class="nav-badge count" id="badge-conferences">0</span>
      </a>
      <a href="#" data-view="sales" class="nav-item" id="nav-sales">
        <span class="nav-icon">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M3 17l4-7 4 3 3-5 4 9" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round" fill="none" />
            <circle cx="16" cy="4" r="2" fill="currentColor" />
          </svg>
        </span>
        <span class="nav-label">Ventas & Diplomado</span>
      </a>
      <a href="#" data-view="leaders" class="nav-item" id="nav-leaders">
        <span class="nav-icon">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M10 2l2.4 4.9 5.4.8-3.9 3.8.9 5.3L10 14.2l-4.8 2.6.9-5.3L2.2 7.7l5.4-.8L10 2z"
              fill="currentColor" />
          </svg>
        </span>
        <span class="nav-label">Líderes VIP</span>
        <span class="nav-badge hot">HOT</span>
      </a>
      <div class="nav-section-label">Análisis</div>
      <a href="#" data-view="reports" class="nav-item" id="nav-reports">
        <span class="nav-icon">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M4 4h12v12H4z" stroke="currentColor" stroke-width="2" fill="none" rx="1" />
            <path d="M7 10l2 2 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          </svg>
        </span>
        <span class="nav-label">Reportes</span>
      </a>
      <div class="nav-section-label">Sistema</div>
      <a href="#" data-view="config" class="nav-item" id="nav-config">
        <span class="nav-icon">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <circle cx="10" cy="10" r="3" stroke="currentColor" stroke-width="2" fill="none" />
            <path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.2 4.2l1.4 1.4M14.4 14.4l1.4 1.4M4.2 15.8l1.4-1.4M14.4 5.6l1.4-1.4"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          </svg>
        </span>
        <span class="nav-label">Configuración</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="book-info">
        <img src="PORTADA.jpg" alt="Esperando contra toda esperanza" class="book-cover"
          onerror="this.style.display='none'" />
        <div>
          <div class="book-title">Esperando contra<br />toda esperanza</div>
          <div class="book-author">J.J. Vargas</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="main-wrapper">
    <!-- Top Bar -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-btn" id="menuBtn" aria-label="Abrir menú">
          <span></span><span></span><span></span>
        </button>
        <div class="breadcrumb" id="breadcrumb">Dashboard KPIs</div>
      </div>
      <div class="topbar-right">
        <div class="search-box">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.5" />
            <path d="M10.5 10.5l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
          </svg>
          <input type="text" placeholder="Buscar..." id="globalSearch" />
        </div>
        <div class="time-display" id="timeDisplay"></div>
        <button class="btn-icon" id="refreshBtn" title="Actualizar datos">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M16 9A7 7 0 1 1 9 2" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            <path d="M9 2l3-2M9 2L7 4.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          </svg>
        </button>
        <button class="btn-icon" id="restoreDataBtnGlobal" title="Cargar Datos Demo / Simulados"
          style="color:var(--emerald-400)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
            <path d="M3 3v5h5"></path>
          </svg>
        </button>
        <button class="btn-icon" id="resetBtn" title="Poner a cero (Borrar todo)" style="color:var(--red-400)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 6h18"></path>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          </svg>
        </button>
        <button class="btn-icon" id="logoutBtn" title="Cerrar Sesión">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
        </button>
      </div>
    </header>

    <!-- Views Container -->
    <main class="content-area">
      <div id="view-dashboard" class="view active"></div>
      <div id="view-leads" class="view"></div>
      <div id="view-conferences" class="view"></div>
      <div id="view-sales" class="view"></div>
      <div id="view-leaders" class="view"></div>
      <div id="view-reports" class="view"></div>
      <div id="view-config" class="view"></div>
    </main>
  </div>

  <!-- Toast Notifications -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle"></h3>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/auth.js"></script>
  <script src="js/data.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/leads.js"></script>
  <script src="js/conferences.js"></script>
  <script src="js/sales.js"></script>
  <script src="js/leaders.js"></script>
  <script src="js/reports.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', Auth.requireAuth);
  </script>
</body>

</html>
